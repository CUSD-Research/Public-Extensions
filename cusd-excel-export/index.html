  <!--
    Two libraries are referenced locally (vendored) so nothing is fetched from a CDN at runtime
    and no district data ever leaves the browser. See README → "One-time: add the two libraries".
      1. Tableau Extensions API  -> ./lib/tableau.extensions.1.latest.min.js
      2. SheetJS (xlsx)          -> ./vendor/xlsx.full.min.js
    If you just want to smoke-test quickly, swap these two lines for the CDN versions noted in README.
  -->
  <script src="./lib/tableau.extensions.1.latest.min.js"></script>
  <script src="./vendor/xlsx.full.min.js"></script>
  <script src="./excel-export.js"></script>
