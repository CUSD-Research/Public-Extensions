<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CUSD Request Help</title>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>
  <!-- This is the in-dashboard view: just the button + a status line. -->
  <div class="wrap">
    <button id="helpBtn" class="cusd-icon-btn" type="button" title="Request help" aria-label="Request help">
      <!-- The button face is the help glyph (same artwork as icon.svg), built on the SAME
           47x79 grid as the Excel-export icon so it sits consistently next to the other
           toolbar icons: envelope + help "i" badge in the top zone, a single "Help" label at
           the bottom (like "Close"/"Excel"). Transparent background (no bg rect). viewBox +
           preserveAspectRatio="xMidYMid meet" auto-fit and centre it as the object is resized.
           The accessible label lives in title/aria-label. -->
      <svg class="btn-glyph" viewBox="0 0 47 79" preserveAspectRatio="xMidYMid meet" role="img" aria-hidden="true" focusable="false">
        <g transform="translate(1.62,1.1) scale(0.8842)">
          <rect x="1" y="16" width="36" height="26" rx="5" fill="#9F9F9F"/>
          <path d="M4 19.5 L19 30.5 L34 19.5" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="34.5" cy="44.5" r="14" fill="#9F9F9F"/>
          <circle cx="34.5" cy="44.5" r="14" fill="none" stroke="#ffffff" stroke-width="2.6"/>
          <circle cx="34.5" cy="40.6" r="2.3" fill="#ffffff"/>
          <rect x="33" y="43.6" width="3" height="7.6" rx="1.5" fill="#ffffff"/>
        </g>
        <text x="23.5" y="74" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="13" fill="#414141">Help</text>
      </svg>
    </button>
    <!-- Empty at rest (icon-only); only shows transient progress or an error. -->
    <div id="status" class="status" role="status" aria-live="polite"></div>
  </div>

  <!--
    The Tableau Extensions API is vendored locally (no runtime CDN) so nothing is
    fetched from the public internet while the dashboard is open. This extension
    needs ONLY the Tableau API: there is no third-party vendor library, and it
    makes no network calls of its own (the email is handed to the OS mail client
    via a mailto: link). See README → "Deploy".
  -->
  <script src="./lib/tableau.extensions.1.latest.min.js"></script>
  <script src="./help-request.js"></script>
</body>
</html>
