<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CUSD KPI Table</title>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>
  <!-- In-dashboard view: an optional toolbar (Download to Excel) + a scroll
       container holding the rendered KPI table. Everything is drawn by
       renderers.js from the source worksheet's summary data (RLS-respected).
       If unconfigured, a hint shows in #status. -->
  <div id="app" class="app">
    <div class="toolbar">
      <select id="yearSelect" class="year-select" title="School year" aria-label="School year" style="display:none"></select>
      <button id="exportBtn" class="icon-btn" type="button" title="Download to Excel" aria-label="Download to Excel" style="display:none">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
          <path d="M12 3v10m0 0l-4-4m4 4l4-4" fill="none" stroke="#5a2d82" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 17v2a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-2" fill="none" stroke="#5a2d82" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div id="status" class="status" role="status" aria-live="polite" style="display:none"></div>
    <div class="scroller">
      <table id="kpiTable" class="kpi"></table>
    </div>
  </div>

  <!-- Vendored at deploy time (see README) — never a runtime CDN.
         1. Tableau Extensions API -> ./lib/tableau.extensions.1.latest.min.js
         2. SheetJS (xlsx)         -> ./vendor/xlsx.full.min.js   (powers the export button)
       renderers.js is the shared pure engine; kpi-table.js is the Tableau glue. -->
  <script src="./lib/tableau.extensions.1.latest.min.js"></script>
  <script src="./vendor/xlsx.full.min.js"></script>
  <script src="./renderers.js"></script>
  <script src="./kpi-table.js"></script>
</body>
</html>
