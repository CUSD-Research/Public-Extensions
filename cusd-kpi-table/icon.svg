<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- CUSD KPI Table extension icon: a table whose cells hold in-line marks
       (bar, circle, sparkline) — the whole point of the extension. -->
  <rect x="6" y="10" width="52" height="44" rx="6" fill="#ffffff" stroke="#5a2d82" stroke-width="3"/>
  <line x1="6" y1="24.7" x2="58" y2="24.7" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="6" y1="39.3" x2="58" y2="39.3" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="20" y1="10" x2="20" y2="54" stroke="#e5e7eb" stroke-width="2"/>
  <!-- row labels -->
  <circle cx="13" cy="17.3" r="2.1" fill="#9aa3ad"/>
  <circle cx="13" cy="32.0" r="2.1" fill="#9aa3ad"/>
  <circle cx="13" cy="46.7" r="2.1" fill="#9aa3ad"/>
  <!-- in-line marks -->
  <rect x="24" y="14.8" width="27" height="5" rx="2.5" fill="#2f6fb0"/>
  <circle cx="28" cy="32" r="4.3" fill="#2e7d57"/>
  <polyline points="24,49.5 30,45 36,47.5 42,42 48,46" fill="none" stroke="#2f6fb0" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="48" cy="46" r="2.1" fill="#2f6fb0"/>
</svg>
